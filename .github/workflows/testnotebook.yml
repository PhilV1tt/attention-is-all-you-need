name: Test Notebooks

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  schedule:
    - cron: '0 2 * * 0'  # Weekly on Sunday at 2 AM

jobs:
  test-notebooks:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest nbval jupyter ipykernel
          pip install torch transformers numpy pandas matplotlib

      - name: Test notebooks with nbval
        run: |
          pytest --nbval attention-is-all-you-need/ \
            --tb=short \
            --timeout=300 \
            -v
        continue-on-error: false

      - name: Generate test report
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Notebooks tested successfully on Python ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY

  lint-notebooks:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install nbstripout flake8 black isort

      - name: Check notebook format
        run: |
          nbstripout --check attention-is-all-you-need/*.ipynb || true

      - name: Lint Python code in notebooks
        run: |
          flake8 attention-is-all-you-need/ --count --statistics || true
